[window]
opacity = 0.95
dynamic_padding = true
# resize_increments = true

[mouse]
bindings = [
  { mouse = "Right", action = "Copy" }
]

[scrolling]
multiplier = 10

[font]
size = 11
normal = { family = "IosevkaTermSlab NF" }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

