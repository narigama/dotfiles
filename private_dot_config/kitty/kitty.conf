font_family      IosevkaTermSlab NF
font_size        12
text_composition_strategy legacy

background_opacity 0.90

# Alacritty's dynamic_padding centers content in leftover space; kitty's
# closest equivalent is placement_strategy = center with some padding.
window_padding_width 0
placement_strategy   center

# Scroll 10 lines per wheel tick (alacritty scrolling.multiplier = 10)
mouse_map right press ungrabbed copy_to_clipboard
wheel_scroll_multiplier 10.0

# Shift+Enter sends ESC + CR
map shift+enter send_text all \x1b\r


# Alacritty built-in default palette (Base16 Default Dark)
foreground            #d8d8d8
background            #181818

color0                #181818
color1                #ac4242
color2                #90a959
color3                #f4bf75
color4                #6a9fb5
color5                #aa759f
color6                #75b5aa
color7                #d8d8d8

color8                #6b6b6b
color9                #c55555
color10               #aac474
color11               #feca88
color12               #82b8c8
color13               #c28cb8
color14               #93d3c3
color15               #f8f8f8

# Disable close confirmation
confirm_os_window_close 0
